koth:
  # Temps requis pour gagner un koth (en secondes)
  win_time: 300
  # Temps en secondes nécessaire pour vérifier le temps pour les koths (en secondes)
  check_time: 1
  # Temps maximum de l'événement
  max_duration: 1800 # 1800 => 30 minutes
  # Nombre de points reçus par la faction gagnante :)
  win_points: 10

totem:
  # Temps en secondes nécessaire pour vérifier le temps pour les totems (en secondes)
  check_time: 10
  # Temps maximum de l'événement
  max_duration: 1800 # 1800 => 30 minutes
  # Nombre de points reçus par la faction gagnante :)
  win_points: 10

dtc:
  # Temps en secondes nécessaire pour vérifier le temps pour les dtc (en secondes)
  check_time: 10
  # Nombre de coups nécessaire pour mettre à jour ? (1 = mise à jour à chaque coup)
  check_hit: 1
  # Temps maximum de l'événement
  max_duration: 1800 # 1800 → 30 minutes
  # Nombre de points reçus par la faction gagnante :)
  win_points: 10

lms:
  # Temps en secondes nécessaire pour vérifier le temps pour les lms (en secondes)
  check_time: 10
  # Temps minimum de création d'une faction pour participer à l'événement (en secondes)
  min_faction_time: 86400
  # Points reçus par la faction gagnante
  win_points: 20
  # Durée d'inscription en secondes (2 minutes)
  registration_time: 120
  # Durée de préparation avant le début du combat (secondes)
  prep_time: 30
  # Durée de la période de grâce au début du combat (secondes) — aucun dégât pendant ce temps
  grace_period: 60
  # Commande console à exécuter pour donner le kit pvp (%player% = nom du joueur)
  kit_command: "kit pvp %player%"
  # Commande console à exécuter pour téléporter au spawn (%player% = nom du joueur)
  spawn_command: "spawn %player%"
  # Récompenses pour le(s) vainqueur(s) de l'event
  win_reward:
    # Argent versé immédiatement via Vault
    money: 5000
    # Nombre minimum d'items (→ /lmsreward)
    items_min: 2
    # Nombre maximum d'items
    items_max: 4
    # Format : MATERIAL:quantité[,ENCHANTMENT:NOM,LEVEL:valeur,...][,WEIGHT:poids]
    items:
      - "GOLDEN_APPLE:5,WEIGHT:8"
      - "RUBY:3,WEIGHT:6"
      - "RUBY_CHESTPLATE:1,ENCHANTMENT:PROTECTION,LEVEL:4,WEIGHT:4"
      - "COBALT_SWORD:1,ENCHANTMENT:SHARPNESS,LEVEL:5,WEIGHT:3"
  # Récompenses pour le top 3 des meilleurs killers
  kill_top_rewards:
    "1":
      money: 2000
      items_min: 2
      items_max: 3
      items:
        - "GOLDEN_APPLE:3,WEIGHT:8"
        - "RUBY:2,WEIGHT:6"
        - "EMERALD:4,WEIGHT:7"
    "2":
      money: 1000
      items_min: 1
      items_max: 2
      items:
        - "GOLDEN_APPLE:2,WEIGHT:8"
        - "RUBY:1,WEIGHT:6"
    "3":
      money: 500
      items_min: 1
      items_max: 1
      items:
        - "GOLDEN_APPLE:1,WEIGHT:8"
        - "EMERALD:2,WEIGHT:7"

domination:
  # Fréquence de vérification du timer (en secondes)
  check_time: 2
  # Durée maximale de l'événement (en secondes) — 1800 = 30 minutes
  max_duration: 1800
  # Score maximal avant victoire automatique (0 = désactivé, victoire par temps)
  score_to_win: 150
  # Points reçus par la faction gagnante (doit être le plus élevé de tous les events)
  win_points: 30
  # Progression de capture de base par seconde (%)
  capture_base: 5
  # Progression supplémentaire par joueur d'avantage (%)
  capture_per_extra: 2
  # Décroissance de la progression par seconde quand la zone est vide ou contestée (%)
  capture_decay: 3
  # Bonus de capture instantané accordé par un kill dans une zone (%)
  kill_capture_bonus: 10
  # Secondes sans mouvement avant qu'un joueur soit considéré AFK
  afk_seconds: 30
  # Secondes de domination totale (toutes les zones) avant que l'anti-snowball se déclenche
  snowball_trigger: 60
  # Intervalle en secondes entre deux applications des effets anti-snowball
  # (doit être > snowball_duration pour éviter le chaînage)
  snowball_interval: 60
  # Durée en secondes des effets de malus/bonus anti-snowball
  snowball_duration: 25
  # Secondes sans contestation avant qu'une zone passe en mode STAGNANT (×0.5 points)
  zone_stagnant_seconds: 120
  # Secondes de contestation récente pour qu'une zone soit considérée HOT (×2 points)
  zone_hot_seconds: 30

  expand:
    # Valeur d'expansion par défaut quand aucune valeur n'est spécifiée dans /domination expand
    default_value: 20
    # Valeurs prédéfinies proposées en tab-complete
    presets: [20, 50, 100, 150]

  rewards:
    # Points faction accordés au 2ème
    second_points: 5
    # Points faction accordés au 3ème
    third_points: 2
    # Argent accordé aux joueurs de la faction gagnante
    winner_money: 5000
    # Argent accordé aux joueurs de la 2ème faction
    second_money: 2000
    # Argent accordé aux joueurs de la 3ème faction
    third_money: 1000
    # Commande console pour téléporter un joueur au spawn (%player% = nom du joueur)
    spawn_command: "spawn %player%"
    loot_chest:
      # Durée en secondes avant que les coffres disparaissent
      duration: 60
      # Nombre minimum d'items différents placés dans chaque coffre
      items_min: 3
      # Nombre maximum d'items différents placés dans chaque coffre
      items_max: 6
      # items_per_chest est conservé pour rétrocompatibilité (ignoré si items_min/items_max sont définis)
      items_per_chest: 5
      # Liste des items possibles
      # Format : MATERIAL:quantité[,ENCHANTMENT:NOM,LEVEL:valeur,...][,WEIGHT:poids]
      # WEIGHT est optionnel (défaut 10) — plus élevé = plus fréquent
      items:
        - "COBALT_AXE:1,ENCHANTMENT:SHARPNESS,LEVEL:5,WEIGHT:4"
        - "COBALT_SWORD:1,ENCHANTMENT:SHARPNESS,LEVEL:4,ENCHANTMENT:FIRE_ASPECT,LEVEL:2,WEIGHT:4"
        - "RUBY_HELMET:1,ENCHANTMENT:PROTECTION,LEVEL:3,WEIGHT:5"
        - "RUBY_CHESTPLATE:1,ENCHANTMENT:PROTECTION,LEVEL:3,WEIGHT:5"
        - "RUBY_LEGGINGS:1,ENCHANTMENT:PROTECTION,LEVEL:3,WEIGHT:5"
        - "RUBY_BOOTS:1,ENCHANTMENT:PROTECTION,LEVEL:3,WEIGHT:5"
        - "RUBY:4,WEIGHT:8"
        - "COBALT_INGOT:1,WEIGHT:7"
        - "OBSIDIAN:64,WEIGHT:10"
        - "RUBY_SWORD:1,ENCHANTMENT:SHARPNESS,LEVEL:5,WEIGHT:3"
        - "EMERALD_BLOCK:3,WEIGHT:8"

purge:
  # Fréquence de vérification du timer (en secondes)
  check_time: 2
  # Durée de la Purge (en secondes) — 1800 = 30 minutes
  max_duration: 1800
  # Points de classement faction accordés au top 5 en fin de Purge (additionnés par faction)
  faction_top_points:
    1: 10
    2: 8
    3: 6
    4: 4
    5: 2
  # Récompense versée à chaque kill effectué pendant la Purge
  kill_reward:
    # Argent versé instantanément via Vault
    money: 100
    # Nombre minimum d'items tirés à chaque kill (0 = aucun item garanti)
    items_min: 0
    # Nombre maximum d'items tirés à chaque kill
    items_max: 1
    # Pool d'items pour les récompenses de kill (stockées via /purgereward)
    # Format : MATERIAL:quantité[,ENCHANTMENT:NOM,LEVEL:valeur,...][,WEIGHT:poids]
    items:
      - "GOLDEN_APPLE:3,WEIGHT:5"
      - "STEEL_INGOT:2,WEIGHT:5"
      - "RUBY:1,WEIGHT:3"
      - "EMERALD:3,WEIGHT:4"
      - "RANDOM_ORE:1,WEIGHT:3"
  # Récompenses de classement final, distribuées à la fin de l'event
  # Argent immédiat via Vault, items en attente via /purgereward
  top_rewards:
    "1":
      money: 5000
      items_min: 4
      items_max: 6
      items:
        - "COBALT_AXE:1,ENCHANTMENT:SHARPNESS,LEVEL:5,WEIGHT:4"
        - "COBALT_SWORD:1,ENCHANTMENT:SHARPNESS,LEVEL:5,ENCHANTMENT:FIRE_ASPECT,LEVEL:2,WEIGHT:4"
        - "RUBY_HELMET:1,ENCHANTMENT:PROTECTION,LEVEL:4,WEIGHT:5"
        - "RUBY_CHESTPLATE:1,ENCHANTMENT:PROTECTION,LEVEL:4,WEIGHT:5"
        - "RUBY_LEGGINGS:1,ENCHANTMENT:PROTECTION,LEVEL:4,WEIGHT:5"
        - "RUBY_BOOTS:1,ENCHANTMENT:PROTECTION,LEVEL:4,WEIGHT:5"
        - "GOLDEN_APPLE:8,WEIGHT:8"
        - "RUBY:8,WEIGHT:6"
    "2":
      money: 2500
      items_min: 3
      items_max: 4
      items:
        - "COBALT_SWORD:1,ENCHANTMENT:SHARPNESS,LEVEL:4,WEIGHT:4"
        - "RUBY_CHESTPLATE:1,ENCHANTMENT:PROTECTION,LEVEL:3,WEIGHT:5"
        - "GOLDEN_APPLE:5,WEIGHT:8"
        - "RUBY:4,WEIGHT:6"
        - "OBSIDIAN:32,WEIGHT:8"
    "3":
      money: 1000
      items_min: 2
      items_max: 3
      items:
        - "GOLDEN_APPLE:3,WEIGHT:8"
        - "RUBY:2,WEIGHT:6"
        - "OBSIDIAN:16,WEIGHT:8"
        - "EXP_BOTTLE:32,WEIGHT:7"
    "4":
      money: 500
      items_min: 1
      items_max: 2
      items:
        - "GOLDEN_APPLE:2,WEIGHT:8"
        - "OBSIDIAN:8,WEIGHT:8"
        - "EXP_BOTTLE:16,WEIGHT:7"
    "5":
      money: 250
      items_min: 1
      items_max: 1
      items:
        - "GOLDEN_APPLE:1,WEIGHT:8"
        - "EXP_BOTTLE:8,WEIGHT:7"

falling_chest:
  # Monde où le coffre peut apparaître
  world: "world"
  # Délai minimum avant réapparition d'un nouveau coffre (en secondes) — 3600 = 1 heure
  respawn_delay_min: 3600
  # Délai maximum avant réapparition d'un nouveau coffre (en secondes) — 7200 = 2 heures
  respawn_delay_max: 7200
  # Durée de vie du coffre s'il n'est pas ouvert (en secondes) — 900 = 15 minutes
  lifetime: 900
  # Délai avant disparition du coffre après que tout son contenu a été récupéré (en secondes)
  disappear_delay: 5
  # Points faction accordés au premier joueur qui ouvre le coffre
  win_points: 5
  # Zone de spawn du coffre (coordonnées min/max)
  range:
    x_min: -500
    x_max: 500
    z_min: -500
    z_max: 500
    # Y maximal pour chercher le sol (scan du haut vers le bas)
    y_max: 120
    # Y minimal pour chercher le sol
    y_min: 5
  # Nombre minimum d'items différents placés dans le coffre
  items_min: 3
  # Nombre maximum d'items différents placés dans le coffre
  items_max: 6
  # Loot du coffre
  # Format : MATERIAL:quantité[,ENCHANTMENT:NOM,LEVEL:valeur,...][,WEIGHT:poids]
  # WEIGHT est optionnel (défaut 10) — plus élevé = plus fréquent
  items:
    - "COBALT_AXE:1,ENCHANTMENT:SHARPNESS,LEVEL:5,WEIGHT:4"
    - "COBALT_SWORD:1,ENCHANTMENT:SHARPNESS,LEVEL:4,ENCHANTMENT:FIRE_ASPECT,LEVEL:2,WEIGHT:4"
    - "RUBY_HELMET:1,ENCHANTMENT:PROTECTION,LEVEL:3,WEIGHT:5"
    - "RUBY_CHESTPLATE:1,ENCHANTMENT:PROTECTION,LEVEL:3,WEIGHT:5"
    - "RUBY_LEGGINGS:1,ENCHANTMENT:PROTECTION,LEVEL:3,WEIGHT:5"
    - "RUBY_BOOTS:1,ENCHANTMENT:PROTECTION,LEVEL:3,WEIGHT:5"
    - "RUBY:4,WEIGHT:8"
    - "COBALT_INGOT:1,WEIGHT:7"
    - "OBSIDIAN:64,WEIGHT:10"
    - "RUBY_SWORD:1,ENCHANTMENT:SHARPNESS,LEVEL:5,WEIGHT:3"
    - "EMERALD_BLOCK:3,WEIGHT:8"

